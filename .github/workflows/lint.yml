name: Lint and Build Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            shellcheck \
            glib2.0-bin \
            meson \
            ninja-build \
            gcc \
            libglib2.0-dev \
            libpolkit-gobject-1-dev

      - name: Validate metadata JSON
        run: jq . extension/metadata.json > /dev/null

      - name: Validate GSettings schema
        run: glib-compile-schemas --strict extension/schemas/

      - name: Shellcheck scripts
        run: shellcheck packaging/*.sh tests/integration/*.sh

      - name: Meson configure and compile check
        run: |
          meson setup build
          meson compile -C build
