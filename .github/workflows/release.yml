name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y glib2.0-bin jq zip

      - name: Build ZIP
        run: bash packaging/make_zip.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
